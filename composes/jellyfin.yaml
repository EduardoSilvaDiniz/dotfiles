services:
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "1000:1000"
    userns_mode: keep-id

    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"

    devices:
      - /dev/dri:/dev/dri

    group_add:
      - "992"

    volumes:
      - /home/edu/jellyfin:/media:ro

    labels:
      io.containers.autoupdate: registry

    restart: unless-stopped
