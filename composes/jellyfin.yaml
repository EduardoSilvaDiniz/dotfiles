services:
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin

    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"

    devices:
      - /dev/dri:/dev/dri

    group_add:
      - "992"

    volumes:
      - "./media:/media:rw,Z"

    labels:
      io.containers.autoupdate: registry

    restart: unless-stopped
