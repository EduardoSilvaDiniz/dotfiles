services:
  postgresql:
    image: docker.io/library/postgres:latest
    container_name: postgres

    restart: always
    shm_size: 128mb
    volumes:
      - ./pgdata:/var/lib/postgresql
      - ./datasets:/datasets
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: 123123
    ports:
      - "5432:5432"
